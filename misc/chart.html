<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>매출 분석 차트</title>
  <!-- FOUC 방지 -->
  <script>(function(){var t=localStorage.getItem('jarvis-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── CSS 변수 (라이트 모드) ── */
    :root {
      --bg:            #dde3f5;
      --card-bg:       rgba(255,255,255,0.62);
      --card-border:   rgba(255,255,255,0.85);
      --card-shadow:   0 8px 32px rgba(60,40,180,0.10), 0 2px 8px rgba(0,0,0,0.04);
      --text-1:        #1a1a2e;
      --text-2:        #4b5563;
      --text-3:        #9ca3af;
      --accent:        #5b72f2;
      --accent-soft:   rgba(91,114,242,0.12);
      --accent-glow:   rgba(91,114,242,0.36);
      --orb-op:        0.22;
      --header-bg:     rgba(255,255,255,0.70);
      --header-border: rgba(200,210,240,0.65);
      --chart-line:    #3b82f6;
      --chart-point:   #0ea5e9;
      --chart-bar-1:   #10b981;
      --chart-bar-2:   #059669;
      --chart-bar-3:   #34d399;
      --chart-grid:    rgba(0,0,0,0.06);
      --tr: background-color 0.35s ease, color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
    }

    /* ── CSS 변수 (다크 모드) ── */
    [data-theme="dark"] {
      --bg:            #0f0f23;
      --card-bg:       rgba(255,255,255,0.055);
      --card-border:   rgba(255,255,255,0.09);
      --card-shadow:   0 8px 32px rgba(0,0,0,0.50), 0 2px 8px rgba(0,0,0,0.30);
      --text-1:        #e0e0e0;
      --text-2:        #a0a0b8;
      --text-3:        #585872;
      --accent:        #818cf8;
      --accent-soft:   rgba(129,140,248,0.13);
      --accent-glow:   rgba(129,140,248,0.38);
      --orb-op:        0.13;
      --header-bg:     rgba(15,15,35,0.82);
      --header-border: rgba(255,255,255,0.07);
      --chart-line:    #60a5fa;
      --chart-point:   #93c5fd;
      --chart-bar-1:   #34d399;
      --chart-bar-2:   #10b981;
      --chart-bar-3:   #6ee7b7;
      --chart-grid:    rgba(255,255,255,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background-color: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      overflow-x: hidden;
      transition: var(--tr);
    }

    /* ── 배경 오브 ── */
    .bg-wrap { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(110px); opacity: var(--orb-op); transition: opacity 0.35s; }
    .o1 { width: 700px; height: 700px; background: #7c3aed; top: -260px; left: -200px; }
    .o2 { width: 600px; height: 600px; background: #ec4899; bottom: -200px; right: -180px; }
    .o3 { width: 460px; height: 460px; background: #3b82f6; top: 45%; left: 55%; transform: translate(-50%,-50%); }

    /* ── 헤더 ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--header-bg);
      backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
      border-bottom: 1px solid var(--header-border);
      padding: 0 28px; height: 62px;
      display: flex; align-items: center; justify-content: space-between;
      transition: var(--tr);
    }
    .back-link {
      text-decoration: none; color: var(--accent);
      font-size: 13.5px; font-weight: 600;
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: 10px;
      transition: background 0.2s, color 0.35s;
    }
    .back-link:hover { background: var(--accent-soft); }
    .header-center { font-size: 15.5px; font-weight: 700; color: var(--text-1); transition: color 0.35s; }
    .theme-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 15px;
      background: var(--card-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 50px; cursor: pointer;
      font-size: 12.5px; font-weight: 600; color: var(--text-1);
      box-shadow: var(--card-shadow);
      transition: var(--tr), transform 0.2s;
      font-family: inherit;
    }
    .theme-btn:hover { transform: translateY(-1px); }

    /* ── 네비게이션 탭 메뉴 ── */
    .nav-tabs {
      position: sticky; top: 62px; z-index: 99;
      background: var(--header-bg);
      backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
      border-bottom: 1px solid var(--header-border);
      padding: 0 28px;
      display: flex; align-items: center; gap: 0;
      overflow-x: auto;
      transition: var(--tr);
    }
    .nav-tab {
      padding: 12px 18px;
      font-size: 13px; font-weight: 600;
      color: var(--text-3);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .nav-tab:hover {
      color: var(--text-2);
    }
    .nav-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── 메인 ── */
    .page {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto;
      padding: 28px;
    }

    .page-title { text-align: center; margin-bottom: 36px; }
    .page-title h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; transition: color 0.35s; }
    .page-subtitle { font-size: 13px; color: var(--text-3); transition: color 0.35s; }

    /* ── 차트 컨테이너 ── */
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
    @media (max-width: 1100px) { .charts-grid { grid-template-columns: 1fr; } }

    .chart-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--card-shadow);
      transition: var(--tr);
    }

    .chart-card h2 {
      font-size: 15px; font-weight: 700;
      color: var(--accent); margin-bottom: 18px;
      text-transform: uppercase; letter-spacing: 0.6px;
      padding-bottom: 12px; border-bottom: 1px solid rgba(0,0,0,0.055);
      transition: color 0.35s;
    }

    .chart-wrapper { position: relative; width: 100%; height: 320px; }

    /* ── SVG 차트 공통 ── */
    svg { width: 100%; height: 100%; }
    .chart-grid-line { stroke: var(--chart-grid); stroke-width: 1; }
    .chart-axis { stroke: var(--text-2); stroke-width: 1.5; }
    .chart-label { font-size: 11px; fill: var(--text-3); transition: fill 0.35s; }
    .chart-value { font-size: 12px; font-weight: 600; fill: var(--text-1); transition: fill 0.35s; }

    /* ── 선 그래프 ── */
    .line-path { fill: none; stroke: var(--chart-line); stroke-width: 2.5; transition: stroke 0.35s; }
    .line-area { fill: var(--chart-point); opacity: 0.1; transition: fill 0.35s, opacity 0.35s; }
    .line-point { fill: var(--chart-point); transition: fill 0.35s; }
    .line-point-label { font-size: 12px; font-weight: 700; fill: var(--chart-line); transition: fill 0.35s; }

    /* ── 막대 그래프 ── */
    .bar { transition: fill 0.35s; }
    .bar-1 { fill: var(--chart-bar-1); }
    .bar-2 { fill: var(--chart-bar-2); }
    .bar-3 { fill: var(--chart-bar-3); }
    .bar-label { font-size: 11px; fill: var(--text-3); transition: fill 0.35s; }
    .bar-value { font-size: 12px; font-weight: 700; fill: var(--text-1); transition: fill 0.35s; }

    /* ── 범례 ── */
    .legend { display: flex; gap: 20px; margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(0,0,0,0.055); }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-2); }
    .legend-color { width: 12px; height: 12px; border-radius: 2px; }
  </style>
</head>
<body>

  <div class="bg-wrap">
    <div class="orb o1"></div>
    <div class="orb o2"></div>
    <div class="orb o3"></div>
  </div>

  <header>
    <a href="index.html" class="back-link">← 메인</a>
    <div class="header-center">매출 분석 차트</div>
    <button class="theme-btn" onclick="toggleVoice()">
      <span id="vi">🔊</span><span id="vl">음성 켜기</span>
    </button>
    <button class="theme-btn" onclick="toggleTheme()">
      <span id="ti">🌙</span><span id="tl">다크 모드</span>
    </button>
  </header>

  <nav class="nav-tabs">
    <a href="../work/dashboard.html" class="nav-tab">📊 대시보드</a>
    <a href="../reports/meeting-result.html" class="nav-tab">📋 회의록</a>
    <a href="chart.html" class="nav-tab active">📈 매출 현황</a>
    <a href="diagram.svg" class="nav-tab">🔄 업무 프로세스</a>
    <a href="../reports/report.html" class="nav-tab">🔍 사이트 분석</a>
  </nav>

  <div class="page">
    <div class="page-title">
      <h1>📊 매출 분석</h1>
      <div class="page-subtitle">2026년 1월 ~ 2월 매출 현황</div>
    </div>

    <div class="charts-grid">
      <!-- 월별 매출 추이 (선 그래프) -->
      <div class="chart-card">
        <h2>📈 월별 매출 추이</h2>
        <div class="chart-wrapper">
          <svg id="lineChart" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="legend">
          <div class="legend-item">
            <div class="legend-color" style="background:var(--chart-line)"></div>
            <span>총 매출액</span>
          </div>
        </div>
      </div>

      <!-- 제품별 매출 (막대 그래프) -->
      <div class="chart-card">
        <h2>🛍️ 제품별 매출 비교</h2>
        <div class="chart-wrapper">
          <svg id="barChart" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="legend">
          <div class="legend-item">
            <div class="legend-color" style="background:var(--chart-bar-1)"></div>
            <span>1월</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background:var(--chart-bar-2)"></div>
            <span>2월</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 데이터 파싱
    const rawData = [
      {date:"2026-01-05",product:"무선 이어폰",sales:4005000},{date:"2026-01-05",product:"보조배터리",sales:1120000},
      {date:"2026-01-05",product:"텀블러",sales:1950000},{date:"2026-01-08",product:"무선 이어폰",sales:4628000},
      {date:"2026-01-08",product:"블루투스 스피커",sales:2160000},{date:"2026-01-08",product:"텀블러",sales:1625000},
      {date:"2026-01-12",product:"보조배터리",sales:1435000},{date:"2026-01-12",product:"무선 충전기",sales:1305000},
      {date:"2026-01-12",product:"에코백",sales:1395000},{date:"2026-01-15",product:"무선 이어폰",sales:3382000},
      {date:"2026-01-15",product:"블루투스 스피커",sales:2640000},{date:"2026-01-15",product:"텀블러",sales:2100000},
      {date:"2026-01-19",product:"보조배터리",sales:1925000},{date:"2026-01-19",product:"에코백",sales:1650000},
      {date:"2026-01-19",product:"무선 충전기",sales:1485000},{date:"2026-01-22",product:"무선 이어폰",sales:5429000},
      {date:"2026-01-22",product:"텀블러",sales:1800000},{date:"2026-01-22",product:"블루투스 스피커",sales:1800000},
      {date:"2026-01-26",product:"보조배터리",sales:1680000},{date:"2026-01-26",product:"에코백",sales:1320000},
      {date:"2026-01-26",product:"무선 충전기",sales:1665000},{date:"2026-02-01",product:"무선 이어폰",sales:6230000},
      {date:"2026-02-01",product:"텀블러",sales:2375000},{date:"2026-02-01",product:"보조배터리",sales:1505000},
      {date:"2026-02-05",product:"블루투스 스피커",sales:3000000},{date:"2026-02-05",product:"에코백",sales:1800000},
      {date:"2026-02-05",product:"무선 충전기",sales:1395000},{date:"2026-02-10",product:"무선 이어폰",sales:5162000},
      {date:"2026-02-10",product:"텀블러",sales:1675000},{date:"2026-02-10",product:"보조배터리",sales:1365000}
    ];

    // 월별 매출 합계
    const monthlySales = {};
    rawData.forEach(d => {
      const month = d.date.substring(0, 7);
      monthlySales[month] = (monthlySales[month] || 0) + d.sales;
    });

    // 제품별·월별 매출
    const productSales = {};
    rawData.forEach(d => {
      const month = d.date.substring(0, 7);
      if(!productSales[d.product]) productSales[d.product] = {jan: 0, feb: 0};
      if(month === '2026-01') productSales[d.product].jan += d.sales;
      if(month === '2026-02') productSales[d.product].feb += d.sales;
    });

    // 숫자 포매팅 (쉼표)
    function formatNum(n) { return n.toLocaleString('ko-KR'); }

    // ─────────────────────────── 선 그래프 ───────────────────────────
    function drawLineChart() {
      const svg = document.getElementById('lineChart');
      const months = Object.keys(monthlySales).sort();
      const values = months.map(m => monthlySales[m]);
      const maxValue = Math.max(...values);

      const padding = { top: 20, right: 30, bottom: 50, left: 60 };
      const w = 500 - padding.left - padding.right;
      const h = 300 - padding.top - padding.bottom;

      // 그리드 라인
      for(let i = 0; i <= 4; i++) {
        const y = padding.top + (h / 4) * i;
        svg.innerHTML += `<line x1="${padding.left}" y1="${y}" x2="${500-padding.right}" y2="${y}" class="chart-grid-line" />`;
        const val = maxValue - (maxValue / 4) * i;
        svg.innerHTML += `<text x="${padding.left - 8}" y="${y + 4}" text-anchor="end" class="chart-label">${formatNum(Math.round(val/1000000))}M</text>`;
      }

      // 축
      svg.innerHTML += `<line x1="${padding.left}" y1="${padding.top}" x2="${padding.left}" y2="${300-padding.bottom}" class="chart-axis" />`;
      svg.innerHTML += `<line x1="${padding.left}" y1="${300-padding.bottom}" x2="${500-padding.right}" y2="${300-padding.bottom}" class="chart-axis" />`;

      // 포인트 계산
      const points = values.map((v, i) => {
        const x = padding.left + (w / (months.length - 1)) * i;
        const y = padding.top + h - (v / maxValue) * h;
        return {x, y, v, m: months[i]};
      });

      // 영역 채우기
      let pathD = `M ${points[0].x} ${padding.top + h}`;
      points.forEach(p => pathD += ` L ${p.x} ${p.y}`);
      pathD += ` L ${points[points.length-1].x} ${padding.top + h} Z`;
      svg.innerHTML += `<path d="${pathD}" class="line-area" />`;

      // 선
      let linePath = `M ${points[0].x} ${points[0].y}`;
      points.forEach((p, i) => { if(i > 0) linePath += ` L ${p.x} ${p.y}`; });
      svg.innerHTML += `<path d="${linePath}" class="line-path" />`;

      // 포인트 & 라벨
      points.forEach(p => {
        svg.innerHTML += `<circle cx="${p.x}" cy="${p.y}" r="4" class="line-point" />`;
        svg.innerHTML += `<text x="${p.x}" y="${p.y - 12}" text-anchor="middle" class="line-point-label">${formatNum(p.v)}</text>`;
        svg.innerHTML += `<text x="${p.x}" y="${300-padding.bottom + 20}" text-anchor="middle" class="chart-label">${p.m}</text>`;
      });
    }

    // ─────────────────────────── 막대 그래프 ───────────────────────────
    function drawBarChart() {
      const svg = document.getElementById('barChart');
      const products = Object.keys(productSales).sort();
      const jan = products.map(p => productSales[p].jan);
      const feb = products.map(p => productSales[p].feb);
      const maxValue = Math.max(...jan, ...feb);

      const padding = { top: 20, right: 30, bottom: 60, left: 60 };
      const w = 500 - padding.left - padding.right;
      const h = 300 - padding.top - padding.bottom;
      const barW = (w / products.length) * 0.35;
      const gap = (w / products.length) * 0.5;

      // 그리드 라인
      for(let i = 0; i <= 4; i++) {
        const y = padding.top + (h / 4) * i;
        svg.innerHTML += `<line x1="${padding.left}" y1="${y}" x2="${500-padding.right}" y2="${y}" class="chart-grid-line" />`;
        const val = maxValue - (maxValue / 4) * i;
        svg.innerHTML += `<text x="${padding.left - 8}" y="${y + 4}" text-anchor="end" class="chart-label">${formatNum(Math.round(val/1000000))}M</text>`;
      }

      // 축
      svg.innerHTML += `<line x1="${padding.left}" y1="${padding.top}" x2="${padding.left}" y2="${300-padding.bottom}" class="chart-axis" />`;
      svg.innerHTML += `<line x1="${padding.left}" y1="${300-padding.bottom}" x2="${500-padding.right}" y2="${300-padding.bottom}" class="chart-axis" />`;

      // 막대
      products.forEach((p, i) => {
        const x = padding.left + gap * i;
        const h1 = (jan[i] / maxValue) * h;
        const h2 = (feb[i] / maxValue) * h;
        const y1 = 300 - padding.bottom - h1;
        const y2 = 300 - padding.bottom - h2;

        // 1월 막대
        svg.innerHTML += `<rect x="${x}" y="${y1}" width="${barW}" height="${h1}" class="bar bar-1" />`;
        if(jan[i] > 0) svg.innerHTML += `<text x="${x + barW/2}" y="${y1 - 6}" text-anchor="middle" class="bar-value" style="font-size:10px">${formatNum(jan[i])}</text>`;

        // 2월 막대
        svg.innerHTML += `<rect x="${x + barW + 3}" y="${y2}" width="${barW}" height="${h2}" class="bar bar-2" />`;
        if(feb[i] > 0) svg.innerHTML += `<text x="${x + barW + 3 + barW/2}" y="${y2 - 6}" text-anchor="middle" class="bar-value" style="font-size:10px">${formatNum(feb[i])}</text>`;

        // 제품명 라벨
        svg.innerHTML += `<text x="${x + barW}" y="${300-padding.bottom + 15}" text-anchor="middle" class="bar-label">${p}</text>`;
      });
    }

    // 테마 토글
    function getTheme() { return localStorage.getItem('jarvis-theme') || 'light'; }
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('ti').textContent = t === 'dark' ? '☀️' : '🌙';
      document.getElementById('tl').textContent = t === 'dark' ? '라이트 모드' : '다크 모드';
      document.getElementById('lineChart').innerHTML = '';
      document.getElementById('barChart').innerHTML = '';
      drawLineChart();
      drawBarChart();
    }
    function toggleTheme() {
      var next = getTheme() === 'dark' ? 'light' : 'dark';
      localStorage.setItem('jarvis-theme', next);
      applyTheme(next);
      speak('Display mode changed to ' + (next === 'dark' ? 'dark' : 'light') + ', Sir.', 'normal');
    }

    var jarvisSpeaking = false;
    function getVoiceEnabled() { return localStorage.getItem('jarvis-voice-enabled') !== 'false'; }
    function applyVoice(enabled) {
      localStorage.setItem('jarvis-voice-enabled', enabled ? 'true' : 'false');
      document.getElementById('vi').textContent = enabled ? '🔊' : '🔇';
      document.getElementById('vl').textContent = enabled ? '음성 켜기' : '음성 끄기';
    }
    function toggleVoice() {
      var next = !getVoiceEnabled();
      applyVoice(next);
      if(next) speak('JARVIS voice system activated, Sir.', 'high');
    }
    function speak(text, priority) {
      if(!getVoiceEnabled() || !('speechSynthesis' in window)) return;
      if(jarvisSpeaking) return;
      jarvisSpeaking = true;
      var utterance = new SpeechSynthesisUtterance(text);
      utterance.language = 'en-GB';
      utterance.pitch = 0.85;
      utterance.rate = 0.75;
      utterance.volume = 1.0;
      var voices = window.speechSynthesis.getVoices();
      var britishVoice = voices.find(function(v) { return v.lang === 'en-GB' || (v.lang.includes('en') && v.name.includes('Google')); });
      if(!britishVoice) britishVoice = voices.find(function(v) { return v.lang.includes('en'); });
      if(britishVoice) utterance.voice = britishVoice;
      utterance.onend = function() { jarvisSpeaking = false; };
      window.speechSynthesis.speak(utterance);
    }

    function highlightCurrentTab() {
      var currentPage = window.location.pathname;
      var tabs = document.querySelectorAll('.nav-tab');
      tabs.forEach(function(tab) {
        tab.classList.remove('active');
        var href = tab.getAttribute('href');
        if(currentPage.includes('chart.html') && href.includes('chart.html')) {
          tab.classList.add('active');
        } else if(currentPage.includes('dashboard.html') && href.includes('dashboard.html')) {
          tab.classList.add('active');
        } else if(currentPage.includes('meeting-result.html') && href.includes('meeting-result.html')) {
          tab.classList.add('active');
        } else if(currentPage.includes('diagram.svg') && href.includes('diagram.svg')) {
          tab.classList.add('active');
        } else if(currentPage.includes('report.html') && href.includes('report.html')) {
          tab.classList.add('active');
        }
      });
    }

    // 초기화
    drawLineChart();
    drawBarChart();
    applyTheme(getTheme());
    highlightCurrentTab();
    applyVoice(getVoiceEnabled());
  </script>
</body>
</html>
